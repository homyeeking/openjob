<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenJob</title>
    <meta http-equiv="refresh" content="0; url=/openjob/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --card: #111111;
        --border: #222222;
        --text: #ededed;
        --muted: #888888;
        --accent: #00d4aa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(0,212,170,0.18), transparent 35%), var(--bg);
        color: var(--text);
        font: 16px/1.5 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .card {
        width: min(560px, 100%);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(17, 17, 17, 0.94);
        box-shadow: 0 24px 80px -40px rgba(0, 0, 0, 0.85);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0,212,170,0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 { margin: 0 0 10px; font-size: clamp(32px, 6vw, 48px); }
      p { margin: 0 0 20px; color: var(--muted); }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 12px;
        background: var(--accent);
        color: #000;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">OpenJob</div>
      <h1>Redirecting to the jobs marketplace.</h1>
      <p>If you are not redirected automatically, open the marketplace entry below.</p>
      <a href="/openjob/">Open marketplace →</a>
    </main>
  </body>
</html>
